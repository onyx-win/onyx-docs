<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Window background -->
  <defs>
    <clipPath id="win"><rect x="0" y="0" width="800" height="480" rx="8" ry="8"/></clipPath>
  </defs>
  <g clip-path="url(#win)">
    <rect x="0" y="0" width="800" height="480" fill="#1c1c1e"/>

    <!-- Title bar -->
    <!-- Shield icon (small, purple) at x=14 y=10, area 14x16 -->
    <g>
      <path d="M14,10 L28,10 L28,16 Q28,22 21,26 Q14,22 14,16 Z" fill="#7274FF"/>
      <path d="M17.5,17 L20,19.5 L25,14.5" stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="36" y="22" fill="#ffffff" font-size="12">Безопасность Windows</text>

    <!-- Window controls (right edge = 800) -->
    <!-- Minimize at (694,16), 10px wide -->
    <line x1="694" y1="16" x2="704" y2="16" stroke="#ffffff" stroke-width="1.2"/>
    <!-- Maximize 8x8 at (738,12) -->
    <rect x="738" y="12" width="8" height="8" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <!-- Close 8x8 at (782,12) -->
    <line x1="782" y1="12" x2="790" y2="20" stroke="#ffffff" stroke-width="1.2"/>
    <line x1="790" y1="12" x2="782" y2="20" stroke="#ffffff" stroke-width="1.2"/>

    <!-- Title bar divider -->
    <line x1="0" y1="36" x2="800" y2="36" stroke="#2e2e32" stroke-width="1"/>

    <!-- Left sidebar -->
    <rect x="0" y="36" width="200" height="444" fill="#202024"/>

    <!-- Sidebar item 1: Домой (y=48, h=44) -->
    <g transform="translate(16,56)">
      <!-- home / circle-arrow icon -->
      <circle cx="8" cy="8" r="7" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <path d="M4,8 L12,8 M9,5 L12,8 L9,11" fill="none" stroke="#a8a8ad" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="44" y="76" fill="#a8a8ad" font-size="13">Домой</text>

    <!-- Sidebar item 2: SELECTED (y=92, h=44) -->
    <rect x="0" y="92" width="200" height="44" fill="#7274FF" fill-opacity="0.14"/>
    <rect x="0" y="92" width="4" height="44" fill="#7274FF"/>
    <!-- Shield icon indigo at x=16 y=98 area 16x16 -->
    <g>
      <path d="M16,98 L32,98 L32,105 Q32,112 24,116 Q16,112 16,105 Z" fill="#7274FF"/>
      <path d="M20,106 L23,109 L28,103" stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="44" y="110" fill="#ffffff" font-size="13" font-weight="600">Защита от вирусов</text>
    <text x="44" y="126" fill="#ffffff" font-size="13" font-weight="600">и угроз</text>

    <!-- Sidebar item 3: user (y=136) -->
    <g transform="translate(16,144)">
      <circle cx="8" cy="5" r="3" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <path d="M2,15 Q2,10 8,10 Q14,10 14,15" fill="none" stroke="#a8a8ad" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="44" y="154" fill="#a8a8ad" font-size="13">Защита учётной</text>
    <text x="44" y="170" fill="#a8a8ad" font-size="13">записи</text>

    <!-- Sidebar item 4: firewall (y=180) -->
    <g transform="translate(16,188)">
      <rect x="0" y="0" width="16" height="16" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <line x1="0" y1="5" x2="16" y2="5" stroke="#a8a8ad" stroke-width="1.2"/>
      <line x1="0" y1="11" x2="16" y2="11" stroke="#a8a8ad" stroke-width="1.2"/>
      <line x1="5" y1="0" x2="5" y2="5" stroke="#a8a8ad" stroke-width="1.2"/>
      <line x1="11" y1="5" x2="11" y2="11" stroke="#a8a8ad" stroke-width="1.2"/>
      <line x1="5" y1="11" x2="5" y2="16" stroke="#a8a8ad" stroke-width="1.2"/>
    </g>
    <text x="44" y="198" fill="#a8a8ad" font-size="13">Брандмауэр и</text>
    <text x="44" y="214" fill="#a8a8ad" font-size="13">защита сети</text>

    <!-- Sidebar item 5: apps grid (y=224) -->
    <g transform="translate(16,232)">
      <rect x="0" y="0" width="6" height="6" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <rect x="10" y="0" width="6" height="6" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <rect x="0" y="10" width="6" height="6" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
      <rect x="10" y="10" width="6" height="6" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
    </g>
    <text x="44" y="242" fill="#a8a8ad" font-size="13">Управление</text>
    <text x="44" y="258" fill="#a8a8ad" font-size="13">приложениями</text>

    <!-- Main content -->
    <text x="220" y="68" fill="#ffffff" font-size="18" font-weight="600">Параметры защиты от вирусов и других угроз</text>
    <text x="220" y="90" fill="#a8a8ad" font-size="12">Просмотр и настройка параметров</text>

    <!-- Card 1: y=108 -->
    <rect x="220" y="108" width="560" height="68" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
    <text x="236" y="130" fill="#ffffff" font-size="13" font-weight="600">Защита в реальном времени</text>
    <text x="236" y="148" fill="#a8a8ad" font-size="11.5">Определение и остановка малвари в реальном времени.</text>
    <rect x="236" y="156" width="68" height="16" rx="3" fill="#d13438" fill-opacity="0.15"/>
    <text x="270" y="167" fill="#d13438" font-size="10" font-weight="700" text-anchor="middle">Отключено</text>
    <!-- Toggle OFF at (720,134) w=32 h=16 -->
    <rect x="720" y="134" width="32" height="16" rx="8" fill="#48484a" stroke="#6d6d75" stroke-width="1"/>
    <circle cx="728" cy="142" r="5" fill="#a8a8ad"/>

    <!-- Card 2: y=184 -->
    <rect x="220" y="184" width="560" height="68" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
    <text x="236" y="206" fill="#ffffff" font-size="13" font-weight="600">Облачная защита</text>
    <text x="236" y="224" fill="#a8a8ad" font-size="11.5">Мгновенная защита из облака Microsoft.</text>
    <rect x="236" y="232" width="68" height="16" rx="3" fill="#d13438" fill-opacity="0.15"/>
    <text x="270" y="243" fill="#d13438" font-size="10" font-weight="700" text-anchor="middle">Отключено</text>
    <rect x="720" y="210" width="32" height="16" rx="8" fill="#48484a" stroke="#6d6d75" stroke-width="1"/>
    <circle cx="728" cy="218" r="5" fill="#a8a8ad"/>

    <!-- Card 3: y=260 -->
    <rect x="220" y="260" width="560" height="68" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
    <text x="236" y="282" fill="#ffffff" font-size="13" font-weight="600">Автоматическая отправка образцов</text>
    <text x="236" y="300" fill="#a8a8ad" font-size="11.5">Отправка образцов в Microsoft.</text>
    <rect x="236" y="308" width="68" height="16" rx="3" fill="#d13438" fill-opacity="0.15"/>
    <text x="270" y="319" fill="#d13438" font-size="10" font-weight="700" text-anchor="middle">Отключено</text>
    <rect x="720" y="286" width="32" height="16" rx="8" fill="#48484a" stroke="#6d6d75" stroke-width="1"/>
    <circle cx="728" cy="294" r="5" fill="#a8a8ad"/>

    <!-- Card 4: y=336 -->
    <rect x="220" y="336" width="560" height="68" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
    <text x="236" y="358" fill="#ffffff" font-size="13" font-weight="600">Защита от подделки</text>
    <text x="236" y="376" fill="#a8a8ad" font-size="11.5">Предотвращает изменение параметров безопасности.</text>
    <rect x="236" y="384" width="68" height="16" rx="3" fill="#d13438" fill-opacity="0.15"/>
    <text x="270" y="395" fill="#d13438" font-size="10" font-weight="700" text-anchor="middle">Отключено</text>
    <rect x="720" y="362" width="32" height="16" rx="8" fill="#48484a" stroke="#6d6d75" stroke-width="1"/>
    <circle cx="728" cy="370" r="5" fill="#a8a8ad"/>
  </g>
  <!-- Outer window border -->
  <rect x="0.5" y="0.5" width="799" height="479" rx="8" ry="8" fill="none" stroke="#38383c" stroke-width="1"/>
</svg>