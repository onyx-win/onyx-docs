<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <radialGradient id="deskGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e04350"/>
      <stop offset="100%" stop-color="#b02830"/>
    </linearGradient>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Desktop background -->
  <rect width="800" height="480" fill="#0d0d16"/>
  <rect width="800" height="480" fill="url(#deskGlow)"/>

  <!-- Taskbar -->
  <rect x="0" y="444" width="800" height="36" fill="#1c1c1e"/>
  <line x1="0" y1="444" x2="800" y2="444" stroke="#2e2e32" stroke-width="1"/>
  <!-- Windows logo (4 small purple squares) -->
  <rect x="18" y="452" width="4" height="4" fill="#7274FF"/>
  <rect x="24" y="452" width="4" height="4" fill="#7274FF"/>
  <rect x="18" y="458" width="4" height="4" fill="#7274FF"/>
  <rect x="24" y="458" width="4" height="4" fill="#7274FF"/>
  <!-- Search icon -->
  <circle cx="52" cy="460" r="4" fill="none" stroke="#a8a8ad" stroke-width="1.2"/>
  <line x1="55" y1="463" x2="58" y2="466" stroke="#a8a8ad" stroke-width="1.2"/>
  <!-- 3 app squares -->
  <rect x="76" y="454" width="12" height="12" rx="2" fill="none" stroke="#a8a8ad" stroke-width="1"/>
  <rect x="96" y="454" width="12" height="12" rx="2" fill="#7274FF" fill-opacity="0.25" stroke="#7274FF" stroke-width="1"/>
  <rect x="116" y="454" width="12" height="12" rx="2" fill="none" stroke="#a8a8ad" stroke-width="1"/>
  <line x1="98" y1="468" x2="106" y2="468" stroke="#7274FF" stroke-width="1.4"/>
  <!-- System tray icons -->
  <path d="M680,458 L686,464 L680,464 Z" fill="#a8a8ad"/>
  <path d="M698,456 L700,456 L700,464 L698,464 L695,466 L695,454 Z" fill="#a8a8ad"/>
  <path d="M702,458 Q704,460 702,462" fill="none" stroke="#a8a8ad" stroke-width="1"/>
  <rect x="712" y="456" width="10" height="6" rx="1" fill="none" stroke="#a8a8ad" stroke-width="1"/>
  <rect x="722" y="458" width="1.4" height="2" fill="#a8a8ad"/>
  <rect x="713" y="457" width="6" height="4" fill="#a8a8ad"/>
  <!-- Clock -->
  <text x="784" y="458" font-size="11" fill="#ffffff" text-anchor="end">14:32</text>
  <text x="784" y="470" font-size="9" fill="#a8a8ad" text-anchor="end">07.07.2026</text>

  <!-- Utility window -->
  <g filter="url(#winShadow)">
    <rect x="225" y="110" width="350" height="280" rx="8" fill="#1c1c1e" stroke="#38383c" stroke-width="1"/>
  </g>

  <!-- Title bar shield icon -->
  <g transform="translate(239, 126)">
    <path d="M-6,-8 L6,-8 L6,-2 Q6,4 0,8 Q-6,4 -6,-2 Z" fill="#7274FF"/>
    <path d="M-2.5,-1 L-0.5,1 L3,-3" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="261" y="132" font-size="12" fill="#ffffff">Defender Control v2.1</text>

  <!-- Window controls -->
  <line x1="464" y1="126" x2="474" y2="126" stroke="#ffffff" stroke-width="1.2"/>
  <rect x="509" y="122" width="8" height="8" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="553" y1="122" x2="561" y2="130" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="561" y1="122" x2="553" y2="130" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Title divider -->
  <line x1="225" y1="142" x2="575" y2="142" stroke="#2e2e32" stroke-width="1"/>

  <!-- Sordum row -->
  <rect x="239" y="154" width="22" height="22" rx="4" fill="#7274FF"/>
  <text x="250" y="170" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
  <text x="269" y="172" font-size="13" font-weight="600" fill="#ffffff">Sordum</text>
  <text x="561" y="172" font-size="10" fill="#6d6d75" text-anchor="end">v2.1</text>

  <!-- Second divider -->
  <line x1="225" y1="192" x2="575" y2="192" stroke="#2e2e32" stroke-width="1"/>

  <!-- Status line -->
  <text x="239" y="222" font-size="12" fill="#ffffff">Защитник Windows:</text>
  <text x="365" y="222" font-size="12" font-weight="700" fill="#d13438">ОТКЛЮЧЕН</text>

  <!-- Sub-status -->
  <circle cx="243" cy="240" r="3" fill="#d13438"/>
  <text x="253" y="244" font-size="11" fill="#a8a8ad">Служба остановлена</text>

  <!-- Big red button -->
  <rect x="250" y="268" width="300" height="52" rx="8" fill="url(#redBtn)" stroke="#8a1e26" stroke-width="1"/>
  <!-- Shield with slash icon -->
  <g transform="translate(280, 294)">
    <path d="M-8,-10 L8,-10 L8,-2 Q8,6 0,11 Q-8,6 -8,-2 Z" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <line x1="-9" y1="9" x2="9" y2="-9" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="410" y="300" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Disable Windows Defender</text>

  <!-- Hint text -->
  <text x="400" y="340" font-size="10" fill="#6d6d75" text-anchor="middle">Menu → Options → Advanced</text>

  <!-- Bottom divider -->
  <line x1="225" y1="356" x2="575" y2="356" stroke="#2e2e32" stroke-width="1"/>

  <!-- Status bar -->
  <circle cx="243" cy="374" r="2.5" fill="#d13438"/>
  <text x="250" y="377" font-size="9" fill="#a8a8ad">Real-Time Protection: OFF</text>
  <text x="561" y="377" font-size="9" fill="#6d6d75" text-anchor="end">www.sordum.org</text>
</svg>