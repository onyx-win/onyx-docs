    <!-- Dialog body -->
    <rect width="360" height="150" rx="8" fill="#22223a" stroke="#2a2a48" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect width="360" height="30" rx="8" fill="#16162a"/>
    <rect y="22" width="360" height="8" fill="#16162a"/>
    <text x="14" y="19" fill="#eaeaf2" font-size="11.5">Выполнить</text>
    <!-- Close button -->
    <text x="340" y="19" fill="#9c9cb4" font-size="12">✕</text>
    
    <!-- Content area -->
    <!-- Run icon (arrow/gear stylized) -->
    <circle cx="30" cy="58" r="12" fill="#7274FF" opacity="0.15"/>
    <path d="M 22 58 L 34 58 M 30 54 L 34 58 L 30 62" stroke="#7274FF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="58" r="1.8" fill="#7274FF"/>
    
    <!-- Description text -->
    <text x="50" y="50" fill="#eaeaf2" font-size="10.5">Введите имя программы, папки, документа</text>
    <text x="50" y="64" fill="#eaeaf2" font-size="10.5">или ресурса Интернета, и Windows откроет</text>
    <text x="50" y="78" fill="#eaeaf2" font-size="10.5">их.</text>
    
    <!-- Input field label -->
    <text x="14" y="102" fill="#eaeaf2" font-size="10.5">Открыть:</text>
    <!-- Input field -->
    <rect x="60" y="90" width="286" height="20" rx="4" fill="#16162a" stroke="#7274FF" stroke-width="1"/>
    <text x="66" y="104" fill="#eaeaf2" font-size="11">%temp%</text>
    <!-- Cursor -->
    <line x1="106" y1="93" x2="106" y2="107" stroke="#eaeaf2" stroke-width="1"/>
    
    <!-- Buttons -->
    <rect x="140" y="120" width="66" height="22" rx="4" fill="#7274FF"/>
    <text x="167" y="135" fill="#ffffff" font-size="11" text-anchor="middle">ОК</text>
    
    <rect x="212" y="120" width="66" height="22" rx="4" fill="#2a2a48" stroke="#2a2a48" stroke-width="1"/>
    <text x="245" y="135" fill="#eaeaf2" font-size="11" text-anchor="middle">Отмена</text>
    
    <rect x="284" y="120" width="66" height="22" rx="4" fill="#2a2a48" stroke="#2a2a48" stroke-width="1"/>
    <text x="317" y="135" fill="#eaeaf2" font-size="11" text-anchor="middle">Обзор...</text>
