<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Desktop background -->
  <rect width="800" height="450" fill="#1c1c2e"/>
  
  <!-- ============ FILE EXPLORER WINDOW (back layer) ============ -->
  <g transform="translate(70, 30)">
