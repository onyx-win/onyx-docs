<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Base window -->
  <rect x="0" y="0" width="800" height="480" rx="8" fill="#1c1c1e"/>

  <!-- Title bar -->
  <text x="14" y="22" font-size="13" font-weight="600" fill="#ffffff">Программы и компоненты</text>
  <!-- Window controls -->
  <line x1="735" y1="16" x2="745" y2="16" stroke="#ffffff" stroke-width="1.2"/>
  <rect x="757" y="12" width="8" height="8" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="778" y1="12" x2="786" y2="20" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="786" y1="12" x2="778" y2="20" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="0" y1="32" x2="800" y2="32" stroke="#2e2e32" stroke-width="1"/>

  <!-- Toolbar strip -->
  <rect x="0" y="32" width="800" height="40" fill="#202024"/>
  <!-- Back arrow -->
  <circle cx="20" cy="52" r="11" fill="none" stroke="#38383c" stroke-width="1"/>
  <text x="20" y="57" font-size="14" fill="#ffffff" text-anchor="middle">‹</text>
  <!-- Forward arrow disabled -->
  <circle cx="52" cy="52" r="11" fill="none" stroke="#38383c" stroke-width="1"/>
  <text x="52" y="57" font-size="14" fill="#6d6d75" text-anchor="middle">›</text>
  <!-- Address bar -->
  <rect x="84" y="42" width="560" height="22" rx="4" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <text x="92" y="57" font-size="11" fill="#ffffff">Панель управления &gt; Все элементы панели управления &gt; Программы и компоненты</text>
  <!-- Search box -->
  <rect x="656" y="42" width="124" height="22" rx="4" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <text x="664" y="57" font-size="11" fill="#6d6d75">Поиск</text>

  <!-- Left sidebar -->
  <rect x="0" y="72" width="200" height="380" fill="#202024"/>
  <text x="16" y="100" font-size="11" fill="#a8a8ad">Панель управления —</text>
  <text x="16" y="114" font-size="11" fill="#a8a8ad">главная страница</text>
  <line x1="12" y1="126" x2="188" y2="126" stroke="#2e2e32" stroke-width="1"/>
  <text x="16" y="148" font-size="11" fill="#ffffff">Просмотр установленных</text>
  <text x="16" y="162" font-size="11" fill="#ffffff">обновлений</text>
  <text x="16" y="186" font-size="11" fill="#ffffff">Включение или отключение</text>
  <text x="16" y="200" font-size="11" fill="#ffffff">компонентов Windows</text>
  <text x="16" y="224" font-size="11" fill="#ffffff">Установка программы</text>
  <text x="16" y="238" font-size="11" fill="#ffffff">из сети</text>

  <!-- Divider between sidebar and content -->
  <line x1="200" y1="72" x2="200" y2="452" stroke="#2e2e32" stroke-width="1"/>

  <!-- Main content heading -->
  <text x="220" y="100" font-size="14" font-weight="700" fill="#ffffff">Удаление или изменение программы</text>
  <text x="220" y="120" font-size="11" fill="#a8a8ad">Для удаления программы выберите её в списке и нажмите Удалить.</text>

  <!-- Column header row -->
  <rect x="220" y="140" width="560" height="28" fill="#202024"/>
  <text x="260" y="158" font-size="11" font-weight="700" fill="#ffffff">Имя</text>
  <text x="440" y="158" font-size="11" font-weight="700" fill="#ffffff">Издатель</text>
  <text x="580" y="158" font-size="11" font-weight="700" fill="#ffffff">Установлено</text>
  <text x="680" y="158" font-size="11" font-weight="700" fill="#ffffff">Размер</text>
  <line x1="430" y1="140" x2="430" y2="168" stroke="#2e2e32" stroke-width="1"/>
  <line x1="570" y1="140" x2="570" y2="168" stroke="#2e2e32" stroke-width="1"/>
  <line x1="670" y1="140" x2="670" y2="168" stroke="#2e2e32" stroke-width="1"/>
  <line x1="220" y1="168" x2="780" y2="168" stroke="#2e2e32" stroke-width="1"/>

  <!-- Row 1: Google Chrome -->
  <rect x="232" y="178" width="14" height="14" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="260" y="188" font-size="12" fill="#ffffff">Google Chrome</text>
  <text x="440" y="188" font-size="12" fill="#a8a8ad">Google LLC</text>
  <text x="580" y="188" font-size="12" fill="#a8a8ad">15.03.2026</text>
  <text x="680" y="188" font-size="12" fill="#a8a8ad">245 МБ</text>

  <!-- Row 2: Kaspersky SELECTED -->
  <rect x="220" y="200" width="560" height="32" fill="#7274FF" fill-opacity="0.28"/>
  <rect x="220" y="200" width="4" height="32" fill="#7274FF"/>
  <rect x="232" y="210" width="14" height="14" rx="2" fill="#7274FF"/>
  <polyline points="235,217 238,220 243,214" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="260" y="220" font-size="12" font-weight="700" fill="#ffffff">Kaspersky Total Security</text>
  <text x="440" y="220" font-size="12" fill="#ffffff">Лаборатория Касперского</text>
  <text x="580" y="220" font-size="12" fill="#ffffff">22.05.2026</text>
  <text x="680" y="220" font-size="12" fill="#ffffff">1,2 ГБ</text>

  <!-- Row 3: Microsoft Edge -->
  <rect x="232" y="242" width="14" height="14" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="260" y="252" font-size="12" fill="#ffffff">Microsoft Edge</text>
  <text x="440" y="252" font-size="12" fill="#a8a8ad">Microsoft Corp.</text>
  <text x="580" y="252" font-size="12" fill="#a8a8ad">01.06.2026</text>
  <text x="680" y="252" font-size="12" fill="#a8a8ad">187 МБ</text>

  <!-- Row 4: NVIDIA -->
  <rect x="232" y="274" width="14" height="14" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="260" y="284" font-size="12" fill="#ffffff">NVIDIA Graphics Driver</text>
  <text x="440" y="284" font-size="12" fill="#a8a8ad">NVIDIA</text>
  <text x="580" y="284" font-size="12" fill="#a8a8ad">10.06.2026</text>
  <text x="680" y="284" font-size="12" fill="#a8a8ad">892 МБ</text>

  <!-- Row 5: Steam -->
  <rect x="232" y="306" width="14" height="14" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="260" y="316" font-size="12" fill="#ffffff">Steam</text>
  <text x="440" y="316" font-size="12" fill="#a8a8ad">Valve</text>
  <text x="580" y="316" font-size="12" fill="#a8a8ad">15.02.2026</text>
  <text x="680" y="316" font-size="12" fill="#a8a8ad">512 МБ</text>

  <!-- Row 6: Visual Studio Code -->
  <rect x="232" y="338" width="14" height="14" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="260" y="348" font-size="12" fill="#ffffff">Visual Studio Code</text>
  <text x="440" y="348" font-size="12" fill="#a8a8ad">Microsoft</text>
  <text x="580" y="348" font-size="12" fill="#a8a8ad">01.05.2026</text>
  <text x="680" y="348" font-size="12" fill="#a8a8ad">320 МБ</text>

  <!-- CONTEXT MENU - positioned below Kaspersky row, does not obscure it -->
  <!-- Drop shadow -->
  <rect x="282" y="239" width="160" height="90" rx="6" fill="#000000" opacity="0.5"/>
  <!-- Menu body -->
  <rect x="280" y="236" width="160" height="90" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <!-- Highlighted first item -->
  <rect x="284" y="240" width="152" height="28" rx="4" fill="#7274FF"/>
  <!-- Trash icon -->
  <g stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round">
    <line x1="290" y1="252" x2="302" y2="252"/>
    <line x1="294" y1="252" x2="294" y2="250"/>
    <line x1="298" y1="252" x2="298" y2="250"/>
    <path d="M291 253 L293 262 L299 262 L301 253"/>
  </g>
  <text x="310" y="258" font-size="12" font-weight="700" fill="#ffffff">Удалить</text>
  <!-- Divider -->
  <line x1="288" y1="268" x2="432" y2="268" stroke="#2e2e32" stroke-width="1"/>
  <text x="310" y="286" font-size="12" fill="#ffffff">Изменить</text>
  <text x="310" y="314" font-size="12" fill="#ffffff">Восстановить</text>

  <!-- Status bar -->
  <rect x="0" y="452" width="800" height="28" fill="#202024"/>
  <line x1="0" y1="452" x2="800" y2="452" stroke="#2e2e32" stroke-width="1"/>
  <text x="14" y="470" font-size="11" fill="#a8a8ad">6 объектов</text>
  <line x1="90" y1="460" x2="90" y2="476" stroke="#38383c" stroke-width="1"/>
  <text x="100" y="470" font-size="11" fill="#a8a8ad">Выбрано: 1</text>
</svg>