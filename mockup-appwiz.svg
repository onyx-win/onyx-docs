<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Window background -->
  <rect x="0" y="0" width="800" height="450" rx="8" fill="#1c1c2e"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="30" rx="8" fill="#16162a"/>
  <rect x="0" y="15" width="800" height="15" fill="#16162a"/>
  <text x="14" y="20" font-size="12" fill="#eaeaf2">Программы и компоненты</text>
  <!-- Window buttons -->
  <text x="735" y="20" font-size="14" fill="#9c9cb4">—</text>
  <rect x="752" y="10" width="10" height="10" fill="none" stroke="#9c9cb4" stroke-width="1"/>
  <text x="778" y="20" font-size="13" fill="#9c9cb4">×</text>
  
  <!-- Toolbar / breadcrumb -->
  <rect x="0" y="30" width="800" height="32" fill="#22223a"/>
  <rect x="0" y="61" width="800" height="1" fill="#2a2a48"/>
  <!-- Back/forward arrows -->
  <circle cx="18" cy="46" r="9" fill="#1c1c2e" stroke="#2a2a48"/>
  <text x="14" y="50" font-size="12" fill="#9c9cb4">‹</text>
  <circle cx="40" cy="46" r="9" fill="#1c1c2e" stroke="#2a2a48"/>
  <text x="36" y="50" font-size="12" fill="#5c5c74">›</text>
  <!-- Address bar -->
  <rect x="58" y="37" width="620" height="18" rx="4" fill="#16162a" stroke="#2a2a48"/>
  <text x="66" y="50" font-size="11" fill="#eaeaf2">Панель управления  ›  Все элементы панели управления  ›  Программы и компоненты</text>
  <!-- Search -->
  <rect x="685" y="37" width="100" height="18" rx="4" fill="#16162a" stroke="#2a2a48"/>
  <text x="692" y="50" font-size="10" fill="#5c5c74">Поиск</text>
  
  <!-- Left sidebar -->
  <rect x="0" y="62" width="170" height="366" fill="#16162a"/>
  <rect x="170" y="62" width="1" height="366" fill="#2a2a48"/>
  <text x="12" y="82" font-size="10" fill="#9c9cb4">Панель управления —</text>
  <text x="12" y="95" font-size="10" fill="#9c9cb4">главная страница</text>
  <line x1="12" y1="108" x2="158" y2="108" stroke="#2a2a48" stroke-width="1"/>
  
  <text x="12" y="128" font-size="10" fill="#eaeaf2">Просмотр установленных</text>
  <text x="12" y="141" font-size="10" fill="#eaeaf2">обновлений</text>
  
  <text x="12" y="165" font-size="10" fill="#eaeaf2">Включение или отключение</text>
  <text x="12" y="178" font-size="10" fill="#eaeaf2">компонентов Windows</text>
  
  <text x="12" y="202" font-size="10" fill="#eaeaf2">Установка программы</text>
  <text x="12" y="215" font-size="10" fill="#eaeaf2">из сети</text>
  
  <!-- Main area heading -->
  <text x="185" y="82" font-size="13" fill="#eaeaf2" font-weight="600">Удаление или изменение программы</text>
  <text x="185" y="100" font-size="10" fill="#9c9cb4">Для удаления программы выберите ее в списке и щелкните "Удалить".</text>
  
  <!-- List header -->
  <rect x="180" y="115" width="612" height="26" fill="#16162a" stroke="#2a2a48"/>
  <text x="192" y="132" font-size="11" fill="#eaeaf2" font-weight="600">Имя</text>
  <line x1="380" y1="118" x2="380" y2="139" stroke="#2a2a48"/>
  <text x="390" y="132" font-size="11" fill="#eaeaf2" font-weight="600">Издатель</text>
  <line x1="540" y1="118" x2="540" y2="139" stroke="#2a2a48"/>
  <text x="550" y="132" font-size="11" fill="#eaeaf2" font-weight="600">Установлено</text>
  <line x1="670" y1="118" x2="670" y2="139" stroke="#2a2a48"/>
  <text x="680" y="132" font-size="11" fill="#eaeaf2" font-weight="600">Размер</text>
  
  <!-- List rows -->
  <!-- Row 1 -->
  <rect x="180" y="141" width="612" height="28" fill="#1c1c2e"/>
  <rect x="184" y="148" width="14" height="14" rx="2" fill="#22223a"/>
  <text x="205" y="159" font-size="11" fill="#eaeaf2">Google Chrome</text>
  <text x="390" y="159" font-size="11" fill="#9c9cb4">Google LLC</text>
  <text x="550" y="159" font-size="11" fill="#9c9cb4">15.03.2026</text>
  <text x="680" y="159" font-size="11" fill="#9c9cb4">245 МБ</text>
  
  <!-- Row 2 HIGHLIGHTED -->
  <rect x="180" y="169" width="612" height="28" fill="#7274FF" fill-opacity="0.25"/>
  <rect x="180" y="169" width="2" height="28" fill="#7274FF"/>
  <rect x="184" y="176" width="14" height="14" rx="2" fill="#7274FF"/>
  <path d="M187 183 L190 186 L195 179" stroke="#eaeaf2" stroke-width="1.5" fill="none"/>
  <text x="205" y="187" font-size="11" fill="#eaeaf2" font-weight="600">Kaspersky Total Security</text>
  <text x="390" y="187" font-size="11" fill="#eaeaf2">Лаборатория Касперского</text>
  <text x="550" y="187" font-size="11" fill="#eaeaf2">22.05.2026</text>
  <text x="680" y="187" font-size="11" fill="#eaeaf2">1,2 ГБ</text>
  
  <!-- Row 3 -->
  <rect x="180" y="197" width="612" height="28" fill="#1c1c2e"/>
  <rect x="184" y="204" width="14" height="14" rx="2" fill="#22223a"/>
  <text x="205" y="215" font-size="11" fill="#eaeaf2">Microsoft Edge</text>
  <text x="390" y="215" font-size="11" fill="#9c9cb4">Microsoft Corp.</text>
  <text x="550" y="215" font-size="11" fill="#9c9cb4">01.06.2026</text>
  <text x="680" y="215" font-size="11" fill="#9c9cb4">187 МБ</text>
  
  <!-- Row 4 -->
  <rect x="180" y="225" width="612" height="28" fill="#1c1c2e"/>
  <rect x="184" y="232" width="14" height="14" rx="2" fill="#22223a"/>
  <text x="205" y="243" font-size="11" fill="#eaeaf2">NVIDIA Graphics Driver</text>
  <text x="390" y="243" font-size="11" fill="#9c9cb4">NVIDIA</text>
  <text x="550" y="243" font-size="11" fill="#9c9cb4">10.06.2026</text>
  <text x="680" y="243" font-size="11" fill="#9c9cb4">892 МБ</text>
  
  <!-- Row 5 -->
  <rect x="180" y="253" width="612" height="28" fill="#1c1c2e"/>
  <rect x="184" y="260" width="14" height="14" rx="2" fill="#22223a"/>
  <text x="205" y="271" font-size="11" fill="#eaeaf2">Steam</text>
  <text x="390" y="271" font-size="11" fill="#9c9cb4">Valve</text>
  <text x="550" y="271" font-size="11" fill="#9c9cb4">15.02.2026</text>
  <text x="680" y="271" font-size="11" fill="#9c9cb4">512 МБ</text>
  
  <!-- Row 6 -->
  <rect x="180" y="281" width="612" height="28" fill="#1c1c2e"/>
  <rect x="184" y="288" width="14" height="14" rx="2" fill="#22223a"/>
  <text x="205" y="299" font-size="11" fill="#eaeaf2">Visual Studio Code</text>
  <text x="390" y="299" font-size="11" fill="#9c9cb4">Microsoft</text>
  <text x="550" y="299" font-size="11" fill="#9c9cb4">01.05.2026</text>
  <text x="680" y="299" font-size="11" fill="#9c9cb4">320 МБ</text>
  
  <!-- Context menu popup over row 2 -->
  <rect x="290" y="188" width="140" height="82" rx="6" fill="#22223a" stroke="#2a2a48" stroke-width="1"/>
  <rect x="290" y="188" width="140" height="82" rx="6" fill="none" stroke="#000" stroke-opacity="0.3"/>
  <!-- shadow feel -->
  <rect x="292" y="270" width="140" height="3" fill="#000" fill-opacity="0.25"/>
  
  <!-- Menu item Удалить highlighted -->
  <rect x="294" y="193" width="132" height="22" rx="4" fill="#7274FF"/>
  <text x="304" y="208" font-size="11" fill="#eaeaf2" font-weight="600">Удалить</text>
  
  <text x="304" y="234" font-size="11" fill="#eaeaf2">Изменить</text>
  <text x="304" y="258" font-size="11" fill="#eaeaf2">Восстановить</text>
  
  <line x1="298" y1="219" x2="422" y2="219" stroke="#2a2a48"/>
  
  <!-- Status bar -->
  <rect x="0" y="428" width="800" height="22" fill="#16162a"/>
  <rect x="0" y="428" width="800" height="1" fill="#2a2a48"/>
  <text x="14" y="443" font-size="10" fill="#9c9cb4">6 объектов</text>
  <line x1="90" y1="432" x2="90" y2="446" stroke="#2a2a48"/>
  <text x="100" y="443" font-size="10" fill="#9c9cb4">Выбрано: 1</text>
</svg>