<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Window background -->
  <rect x="0" y="0" width="800" height="480" rx="8" fill="#1c1c1e"/>

  <!-- Title bar -->
  <text x="14" y="22" font-size="12" fill="#ffffff">Программы и компоненты</text>
  <!-- Window controls -->
  <line x1="694" y1="16" x2="704" y2="16" stroke="#ffffff" stroke-width="1.2"/>
  <rect x="738" y="12" width="8" height="8" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="782" y1="12" x2="790" y2="20" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="790" y1="12" x2="782" y2="20" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="0" y1="32" x2="800" y2="32" stroke="#2e2e32" stroke-width="1"/>

  <!-- Toolbar / breadcrumb strip -->
  <rect x="0" y="32" width="800" height="36" fill="#202024"/>
  <circle cx="24" cy="52" r="10" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <path d="M27,48 L21,52 L27,56" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <circle cx="52" cy="52" r="10" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <path d="M49,48 L55,52 L49,56" fill="none" stroke="#6d6d75" stroke-width="1.2"/>

  <rect x="68" y="42" width="600" height="20" rx="4" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <text x="74" y="56" font-size="11" fill="#a8a8ad">Панель управления › Все элементы панели управления › Программы и компоненты</text>

  <rect x="680" y="42" width="104" height="20" rx="4" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <text x="688" y="56" font-size="11" fill="#6d6d75">Поиск</text>

  <!-- Sidebar -->
  <rect x="0" y="68" width="200" height="384" fill="#202024"/>
  <line x1="200" y1="68" x2="200" y2="452" stroke="#2e2e32" stroke-width="1"/>

  <text x="14" y="94" font-size="10" fill="#a8a8ad">Панель управления —</text>
  <text x="14" y="108" font-size="10" fill="#a8a8ad">главная страница</text>

  <line x1="14" y1="120" x2="186" y2="120" stroke="#2e2e32" stroke-width="1"/>

  <text x="14" y="144" font-size="10" fill="#ffffff">Просмотр установленных</text>
  <text x="14" y="158" font-size="10" fill="#ffffff">обновлений</text>

  <text x="14" y="182" font-size="10" fill="#ffffff">Включение или отключение</text>
  <text x="14" y="196" font-size="10" fill="#ffffff">компонентов Windows</text>

  <text x="14" y="220" font-size="10" fill="#ffffff">Установка программы</text>
  <text x="14" y="234" font-size="10" fill="#ffffff">из сети</text>

  <!-- Main content -->
  <text x="220" y="94" font-size="14" font-weight="600" fill="#ffffff">Удаление или изменение программы</text>
  <text x="220" y="112" font-size="11" fill="#a8a8ad">Для удаления программы выберите её в списке и нажмите Удалить.</text>

  <!-- Column headers -->
  <rect x="200" y="130" width="600" height="28" fill="#202024"/>
  <line x1="200" y1="158" x2="800" y2="158" stroke="#2e2e32" stroke-width="1"/>
  <text x="252" y="148" font-size="11" font-weight="600" fill="#ffffff">Имя</text>
  <text x="440" y="148" font-size="11" font-weight="600" fill="#ffffff">Издатель</text>
  <text x="580" y="148" font-size="11" font-weight="600" fill="#ffffff">Установлено</text>
  <text x="690" y="148" font-size="11" font-weight="600" fill="#ffffff">Размер</text>
  <line x1="432" y1="132" x2="432" y2="156" stroke="#2e2e32" stroke-width="1"/>
  <line x1="572" y1="132" x2="572" y2="156" stroke="#2e2e32" stroke-width="1"/>
  <line x1="682" y1="132" x2="682" y2="156" stroke="#2e2e32" stroke-width="1"/>

  <!-- Row 1: Google Chrome -->
  <rect x="200" y="158" width="600" height="30" fill="#1c1c1e"/>
  <rect x="214" y="167" width="12" height="12" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="252" y="176" font-size="12" fill="#ffffff">Google Chrome</text>
  <text x="440" y="176" font-size="12" fill="#a8a8ad">Google LLC</text>
  <text x="580" y="176" font-size="12" fill="#a8a8ad">15.03.2026</text>
  <text x="690" y="176" font-size="12" fill="#a8a8ad">245 МБ</text>

  <!-- Row 2: Kaspersky (SELECTED) -->
  <rect x="200" y="188" width="600" height="30" fill="#3c5ed6" fill-opacity="0.3"/>
  <rect x="214" y="197" width="12" height="12" rx="2" fill="#7274FF" stroke="#7274FF" stroke-width="1"/>
  <path d="M217,203 L220,206 L224,200" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="252" y="206" font-size="12" fill="#ffffff">Kaspersky Total Security</text>
  <text x="440" y="206" font-size="12" fill="#ffffff">Лаборатория Касперского</text>
  <text x="580" y="206" font-size="12" fill="#ffffff">22.05.2026</text>
  <text x="690" y="206" font-size="12" fill="#ffffff">1,2 ГБ</text>

  <!-- Row 3: Microsoft Edge -->
  <rect x="200" y="218" width="600" height="30" fill="#1e1e22"/>
  <rect x="214" y="227" width="12" height="12" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="252" y="236" font-size="12" fill="#ffffff">Microsoft Edge</text>
  <text x="440" y="236" font-size="12" fill="#a8a8ad">Microsoft Corp.</text>
  <text x="580" y="236" font-size="12" fill="#a8a8ad">10.02.2026</text>
  <text x="690" y="236" font-size="12" fill="#a8a8ad">312 МБ</text>

  <!-- Row 4: NVIDIA Graphics Driver -->
  <rect x="200" y="248" width="600" height="30" fill="#1c1c1e"/>
  <rect x="214" y="257" width="12" height="12" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="252" y="266" font-size="12" fill="#ffffff">NVIDIA Graphics Driver</text>
  <text x="440" y="266" font-size="12" fill="#a8a8ad">NVIDIA Corporation</text>
  <text x="580" y="266" font-size="12" fill="#a8a8ad">18.06.2026</text>
  <text x="690" y="266" font-size="12" fill="#a8a8ad">876 МБ</text>

  <!-- Row 5: Steam -->
  <rect x="200" y="278" width="600" height="30" fill="#1e1e22"/>
  <rect x="214" y="287" width="12" height="12" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="252" y="296" font-size="12" fill="#ffffff">Steam</text>
  <text x="440" y="296" font-size="12" fill="#a8a8ad">Valve Corporation</text>
  <text x="580" y="296" font-size="12" fill="#a8a8ad">04.01.2026</text>
  <text x="690" y="296" font-size="12" fill="#a8a8ad">520 МБ</text>

  <!-- Row 6: Visual Studio Code -->
  <rect x="200" y="308" width="600" height="30" fill="#1c1c1e"/>
  <rect x="214" y="317" width="12" height="12" rx="2" fill="none" stroke="#6d6d75" stroke-width="1"/>
  <text x="252" y="326" font-size="12" fill="#ffffff">Visual Studio Code</text>
  <text x="440" y="326" font-size="12" fill="#a8a8ad">Microsoft Corp.</text>
  <text x="580" y="326" font-size="12" fill="#a8a8ad">28.04.2026</text>
  <text x="690" y="326" font-size="12" fill="#a8a8ad">380 МБ</text>

  <!-- Vertical column separators over rows -->
  <line x1="432" y1="158" x2="432" y2="338" stroke="#2e2e32" stroke-width="1"/>
  <line x1="572" y1="158" x2="572" y2="338" stroke="#2e2e32" stroke-width="1"/>
  <line x1="682" y1="158" x2="682" y2="338" stroke="#2e2e32" stroke-width="1"/>

  <!-- Context menu shadow -->
  <rect x="402" y="197" width="160" height="90" rx="6" fill="#000000" fill-opacity="0.35"/>
  <!-- Context menu popup -->
  <rect x="400" y="195" width="160" height="90" rx="6" fill="#2a2a2e" stroke="#38383c" stroke-width="1"/>
  <!-- Item 1: Удалить (highlighted) -->
  <rect x="404" y="199" width="152" height="26" rx="4" fill="#7274FF"/>
  <!-- Trash icon -->
  <rect x="414" y="207" width="8" height="9" rx="1" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="412" y1="207" x2="424" y2="207" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="416" y1="205" x2="420" y2="205" stroke="#ffffff" stroke-width="1.2"/>
  <text x="432" y="216" font-size="12" font-weight="600" fill="#ffffff">Удалить</text>
  <line x1="408" y1="227" x2="552" y2="227" stroke="#38383c" stroke-width="1"/>
  <!-- Item 2: Изменить -->
  <text x="418" y="242" font-size="12" fill="#ffffff">Изменить</text>
  <!-- Item 3: Восстановить -->
  <text x="418" y="268" font-size="12" fill="#ffffff">Восстановить</text>

  <!-- Status bar -->
  <rect x="0" y="452" width="800" height="28" fill="#202024"/>
  <line x1="0" y1="452" x2="800" y2="452" stroke="#2e2e32" stroke-width="1"/>
  <text x="14" y="470" font-size="11" fill="#a8a8ad">6 объектов</text>
  <line x1="90" y1="460" x2="90" y2="472" stroke="#38383c" stroke-width="1"/>
  <text x="100" y="470" font-size="11" fill="#a8a8ad">Выбрано: 1</text>
</svg>