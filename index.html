<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx — Documentation</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">

    <!-- Open Graph / Telegram Preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Onyx — Documentation">
    <meta property="og:description" content="Полное руководство по установке и запуску Onyx. Complete installation and launch guide.">
    <meta property="og:image" content="logo.svg">
    <meta property="og:site_name" content="Onyx">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Onyx — Documentation">
    <meta name="twitter:description" content="Installation Guide & Launch">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #05050a;
            --bg-dark: #08080f;
            --bg-main: #0b0b15;
            --bg-sidebar: #08080f;
            --bg-card: #11111c;
            --bg-card-hover: #17172a;
            --bg-elevated: #1c1c30;
            --bg-input: #0d0d18;
            --border: #1e1e34;
            --border-light: #2a2a48;
            --text-white: #ffffff;
            --text-primary: #e8e8f0;
            --text-secondary: #9090a8;
            --text-muted: #5c5c78;
            --orange: #7274FF;
            --orange-light: #9698FF;
            --orange-dark: #4E51E0;
            --orange-vivid: #5C5EEB;
            --orange-glow: rgba(114, 116, 255, 0.16);
            --orange-glow-strong: rgba(114, 116, 255, 0.38);
            --purple: #b57bff;
            --purple-glow: rgba(181, 123, 255, 0.15);
            --green: #10d876;
            --green-glow: rgba(16, 216, 118, 0.12);
            --red: #ff4757;
            --red-glow: rgba(255, 71, 87, 0.1);
            --blue: #3b8fff;
            --blue-glow: rgba(59, 143, 255, 0.1);
            --yellow: #fbbf24;
            --yellow-glow: rgba(251, 191, 36, 0.1);
            --gradient-orange: linear-gradient(135deg, #5C5EEB 0%, #7274FF 50%, #9698FF 100%);
            --gradient-fire: linear-gradient(135deg, #4E51E0, #7274FF 45%, #b57bff);
            --gradient-purple: linear-gradient(135deg, #7c3aed, #b57bff);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-lift: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(114, 116, 255, 0.15);
            --shadow-glow-strong: 0 0 60px rgba(114, 116, 255, 0.35);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { overflow-x: hidden; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
        }

        /* ========= ANIMATED AURORA BACKGROUND ========= */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 800px 600px at 15% 10%, rgba(114, 116, 255, 0.14), transparent 60%),
                radial-gradient(ellipse 700px 500px at 85% 20%, rgba(168, 85, 247, 0.09), transparent 60%),
                radial-gradient(ellipse 900px 700px at 50% 100%, rgba(114, 116, 255, 0.07), transparent 70%);
            z-index: -2;
            animation: auroraDrift 25s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: -1;
            pointer-events: none;
            mask-image: radial-gradient(circle at 50% 30%, rgba(0, 0, 0, 0.6), transparent 85%);
            -webkit-mask-image: radial-gradient(circle at 50% 30%, rgba(0, 0, 0, 0.6), transparent 85%);
        }

        @keyframes auroraDrift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(3%, -2%); }
            66% { transform: translate(-2%, 3%); }
        }

        /* ========= SCROLLBAR ========= */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--orange), var(--orange-dark));
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--orange-light); background-clip: padding-box; }

        ::selection {
            background: var(--orange-glow-strong);
            color: var(--text-white);
        }

        /* ========= LAYOUT ========= */
        .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

        /* ========= SIDEBAR ========= */
        .sidebar {
            width: 290px;
            background: rgba(8, 8, 15, 0.7);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.4s var(--ease-out);
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 220px;
            background: radial-gradient(ellipse at top, rgba(114, 116, 255, 0.09), transparent 70%);
            pointer-events: none;
        }

        .sidebar-header {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
        }

        .sidebar-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(114, 116, 255, 0.5));
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(114, 116, 255, 0.45)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 22px rgba(114, 116, 255, 0.8)); transform: scale(1.04); }
        }

        .sidebar-brand { display: flex; flex-direction: column; }

        .sidebar-brand-name {
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            background: linear-gradient(135deg, #ffffff 0%, #9698FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-brand-name span {
            color: var(--orange);
            -webkit-text-fill-color: var(--orange);
        }

        .sidebar-brand-sub {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.7px;
            margin-top: 3px;
        }

        /* Language Toggle */
        .lang-toggle {
            display: flex;
            background: var(--bg-void);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin: 18px 16px 4px;
            border: 1px solid var(--border);
            position: relative;
        }

        .lang-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.35s var(--ease-out);
            font-family: inherit;
            letter-spacing: 0.6px;
            position: relative;
            z-index: 1;
        }

        .lang-btn:hover { color: var(--text-secondary); }

        .lang-btn.active {
            background: var(--gradient-orange);
            color: var(--bg-void);
            box-shadow: 0 4px 16px rgba(114, 116, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        /* Sidebar Nav */
        .sidebar-nav { padding: 14px 12px 32px; position: relative; }

        .nav-section { margin-bottom: 8px; }

        .nav-section-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--text-muted);
            padding: 16px 12px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-section-title::before {
            content: '';
            width: 3px;
            height: 3px;
            background: var(--orange);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--orange);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.3s var(--ease-out);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(114, 116, 255, 0.07), transparent);
            transform: translateX(-100%);
            transition: transform 0.7s var(--ease-out);
        }

        .nav-link:hover::before { transform: translateX(100%); }

        .nav-link:hover {
            background: rgba(114, 116, 255, 0.06);
            color: var(--text-primary);
            transform: translateX(3px);
        }

        .nav-link.active {
            background: linear-gradient(90deg, rgba(114, 116, 255, 0.16), rgba(114, 116, 255, 0.02));
            color: var(--orange);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 22px;
            background: var(--gradient-orange);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 14px var(--orange);
        }

        .nav-icon {
            font-size: 15px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
            transition: transform 0.35s var(--ease-out);
        }

        .nav-link:hover .nav-icon { transform: scale(1.2) rotate(-6deg); }
        .nav-link.active .nav-icon { filter: drop-shadow(0 0 6px var(--orange-glow-strong)); }

        /* Status indicator */
        .sidebar-status {
            margin: 14px 16px;
            padding: 11px 14px;
            background: linear-gradient(90deg, var(--green-glow), transparent 90%);
            border: 1px solid rgba(16, 216, 118, 0.22);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--green);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: statusPulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px var(--green);
            flex-shrink: 0;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 216, 118, 0.55), 0 0 10px var(--green); }
            50% { opacity: 0.75; box-shadow: 0 0 0 7px rgba(16, 216, 118, 0), 0 0 14px var(--green); }
        }

        /* ========= MAIN ========= */
        .main {
            margin-left: 290px;
            flex: 1;
            min-width: 0;
            position: relative;
        }

        /* Top Bar */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(8, 8, 15, 0.7);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-bottom: 1px solid var(--border);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.25s;
        }

        .breadcrumb a:hover { color: var(--orange); }
        .breadcrumb .sep { color: var(--border-light); font-size: 10px; }
        .breadcrumb #breadcrumb-current { color: var(--text-primary); font-weight: 500; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 15px;
            width: 300px;
            transition: all 0.35s var(--ease-out);
        }

        .search-box:focus-within {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px var(--orange-glow), 0 0 24px var(--orange-glow);
            transform: translateY(-1px);
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-icon { color: var(--text-muted); font-size: 14px; transition: color 0.25s; }
        .search-box:focus-within .search-icon { color: var(--orange); }

        /* ========= CONTENT ========= */
        .content {
            max-width: 880px;
            margin: 0 auto;
            padding: 48px 40px 100px;
        }

        .page-header { margin-bottom: 36px; }

        .page-header h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -0.8px;
            margin-bottom: 14px;
            color: var(--text-white);
            line-height: 1.12;
        }

        .page-header h1 .accent {
            background: var(--gradient-orange);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: gradientFlow 5s ease-in-out infinite;
            filter: drop-shadow(0 4px 20px rgba(114, 116, 255, 0.25));
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .page-header .subtitle {
            font-size: 15.5px;
            color: var(--text-secondary);
            line-height: 1.65;
            max-width: 720px;
        }

        .section { display: none; }
        .section.active {
            display: block;
            animation: sectionIn 0.6s var(--ease-out);
        }

        @keyframes sectionIn {
            from { opacity: 0; transform: translateY(14px); filter: blur(6px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        h2 {
            font-size: 22px;
            font-weight: 800;
            margin: 40px 0 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-white);
            letter-spacing: -0.3px;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--gradient-orange);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--orange-glow-strong);
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 26px 0 12px;
            color: var(--text-primary);
        }

        p {
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        a { color: var(--orange-light); text-decoration: none; transition: all 0.2s; }
        a:hover { color: var(--orange); text-decoration: underline; text-shadow: 0 0 12px var(--orange-glow); }

        /* ========= ALERTS ========= */
        .alert {
            padding: 18px 22px;
            border-radius: var(--radius-md);
            margin: 22px 0;
            font-size: 14px;
            line-height: 1.65;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .alert::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: currentColor;
            opacity: 0.7;
            box-shadow: 0 0 20px currentColor;
        }

        .alert-icon {
            font-size: 20px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .alert-warning {
            background: linear-gradient(90deg, var(--yellow-glow), transparent 90%);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: var(--yellow);
        }

        .alert-danger {
            background: linear-gradient(90deg, var(--red-glow), transparent 90%);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: var(--red);
        }

        .alert-info {
            background: linear-gradient(90deg, var(--blue-glow), transparent 90%);
            border: 1px solid rgba(59, 143, 255, 0.2);
            color: var(--blue);
        }

        .alert-success {
            background: linear-gradient(90deg, var(--green-glow), transparent 90%);
            border: 1px solid rgba(16, 216, 118, 0.2);
            color: var(--green);
        }

        .alert-orange {
            background: linear-gradient(90deg, var(--orange-glow), transparent 90%);
            border: 1px solid rgba(114, 116, 255, 0.22);
            color: var(--orange-light);
        }

        .alert strong { color: inherit; font-weight: 700; }

        /* ========= STEPS ========= */
        .steps {
            counter-reset: step;
            margin: 22px 0;
        }

        .step {
            counter-increment: step;
            position: relative;
            padding: 20px 24px 20px 74px;
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(17, 17, 28, 0.55) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.65;
            transition: all 0.4s var(--ease-out);
            overflow: hidden;
        }

        .step::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(114, 116, 255, 0.04) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.9s var(--ease-out);
            pointer-events: none;
        }

        .step:hover::after { transform: translateX(100%); }

        .step:hover {
            border-color: rgba(114, 116, 255, 0.3);
            background: linear-gradient(135deg, var(--bg-card-hover) 0%, rgba(23, 23, 42, 0.7) 100%);
            box-shadow: var(--shadow-glow), 0 6px 24px rgba(0, 0, 0, 0.3);
            transform: translateX(4px);
        }

        .step::before {
            content: counter(step);
            position: absolute;
            left: 20px;
            top: 18px;
            width: 36px;
            height: 36px;
            background: var(--gradient-orange);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: var(--bg-void);
            box-shadow: 0 4px 16px rgba(114, 116, 255, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.4s var(--ease-out);
        }

        .step:hover::before {
            transform: scale(1.12) rotate(-6deg);
            box-shadow: 0 8px 28px rgba(114, 116, 255, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .step strong { color: var(--text-white); font-weight: 700; }
        .step a { color: var(--orange-light); font-weight: 500; }

        /* ========= ERROR CARDS ========= */
        .error-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(17, 17, 28, 0.65) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.35s var(--ease-out);
            position: relative;
        }

        .error-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--gradient-orange);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .error-card:hover::before,
        .error-card.open::before { opacity: 1; }

        .error-card:hover {
            border-color: rgba(114, 116, 255, 0.28);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35), var(--shadow-glow);
            transform: translateX(2px);
        }

        .error-card.open {
            border-color: rgba(114, 116, 255, 0.4);
            box-shadow: var(--shadow-glow-strong), 0 8px 32px rgba(0, 0, 0, 0.45);
        }

        .error-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.25s;
        }

        .error-header:hover { background: rgba(114, 116, 255, 0.04); }

        .error-number {
            background: var(--gradient-orange);
            color: var(--bg-void);
            font-size: 11px;
            font-weight: 900;
            padding: 4px 11px;
            border-radius: 7px;
            flex-shrink: 0;
            min-width: 38px;
            text-align: center;
            letter-spacing: 0.4px;
            box-shadow: 0 2px 10px rgba(114, 116, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .error-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .error-arrow {
            color: var(--text-muted);
            font-size: 11px;
            transition: all 0.4s var(--ease-out);
            flex-shrink: 0;
        }

        .error-card.open .error-arrow {
            transform: rotate(90deg);
            color: var(--orange);
            filter: drop-shadow(0 0 6px var(--orange));
        }

        .error-body {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid var(--border);
        }

        .error-card.open .error-body {
            display: block;
            animation: bodyIn 0.4s var(--ease-out);
        }

        @keyframes bodyIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-body p { margin-top: 14px; }

        .solution-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;

    <script>
        let currentLang = 'ru';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
            document.querySelectorAll('[data-ru]').forEach(el => {
                const t = el.getAttribute(`data-${lang}`);
                if (t) el.innerHTML = t;
            });
            const si = document.getElementById('searchInput');
            si.placeholder = si.getAttribute(`data-placeholder-${lang}`);
        }

        function showPage(page) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const navEl = document.querySelector(`.nav-link[data-page="${page}"]`);
            if (navEl) navEl.classList.add('active');
            const activeSpan = navEl ? navEl.querySelector('span:last-child') : null;
            if (activeSpan) {
                const bc = document.getElementById('breadcrumb-current');
                bc.setAttribute('data-ru', activeSpan.getAttribute('data-ru') || activeSpan.textContent);
                bc.setAttribute('data-en', activeSpan.getAttribute('data-en') || activeSpan.textContent);
                bc.innerHTML = activeSpan.getAttribute(`data-${currentLang}`) || activeSpan.textContent;
            }
            window.scrollTo(0, 0);
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        function toggleError(header) {
            header.closest('.error-card').classList.toggle('open');
        }

        function handleSearch(q) {
            q = q.toLowerCase().trim();
            document.querySelectorAll('.error-card').forEach(card => {
                if (!q) { card.classList.remove('search-hidden'); return; }
                const t = card.querySelector('.error-title').textContent.toLowerCase();
                const b = card.querySelector('.error-body') ? card.querySelector('.error-body').textContent.toLowerCase() : '';
                const n = card.getAttribute('data-error');
                if (t.includes(q) || b.includes(q) || n === q || '#'+n === q) {
                    card.classList.remove('search-hidden');
                    card.classList.add('open');
                } else {
                    card.classList.add('search-hidden');
                }
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        setLang('ru');

        // Cursor-following glow on feature cards
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
                card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
            });
        });

        // Smooth-scroll fade for section transitions is handled by CSS.
        // Escape key closes any open sidebar on mobile.
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('open');
            }
        });
    </script>
